name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "release/*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync bundled agents
        run: bash scripts/sync_bundled_agents.sh

      - name: Install build tools
        run: python3 -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python3 -m build

      - name: Verify wheel installs and the CLI runs (bd-rm-ux-p2)
        # Gate publishing on the artifact actually working: install the
        # freshly built wheel into a throwaway venv (no source checkout, no
        # editable install) and exercise the two entry points a first-time
        # user hits immediately after `pip install agent-baton`. If this
        # fails, `needs: build` keeps both publish jobs from running, so a
        # broken wheel never reaches TestPyPI/PyPI.
        run: |
          set -euo pipefail
          python3 -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/pip install --quiet dist/*.whl
          mkdir -p /tmp/wheel-smoke-cwd
          cd /tmp/wheel-smoke-cwd
          /tmp/wheel-smoke-venv/bin/baton --help
          /tmp/wheel-smoke-venv/bin/baton doctor --json | python3 -c "
          import json, sys
          payload = json.load(sys.stdin)
          assert payload['schema_version'] == 1
          assert isinstance(payload['ok'], bool)
          ids = {c['id'] for c in payload['checks']}
          assert 'bundled_agents' in ids, ids
          bundled = next(c for c in payload['checks'] if c['id'] == 'bundled_agents')
          assert bundled['details']['count'] > 0, 'no bundled agents resolved from the installed wheel'
          print('wheel smoke OK:', bundled['details']['count'], 'bundled agents')
          "

      - name: Store distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Run on release/* branches (pre-release validation) and on version tags
    if: |
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-baton
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Falls back to PYPI_API_TOKEN secret if OIDC trusted publishing is not configured
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    # Only publish to real PyPI on version tags
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/agent-baton
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Falls back to PYPI_API_TOKEN secret if OIDC trusted publishing is not configured
          password: ${{ secrets.PYPI_API_TOKEN }}
