name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "release/*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync bundled agents
        run: bash scripts/sync_bundled_agents.sh

      - name: Install build tools
        run: python3 -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python3 -m build

      - name: Store distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Run on release/* branches (pre-release validation) and on version tags
    if: |
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-baton
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Falls back to PYPI_API_TOKEN secret if OIDC trusted publishing is not configured
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    # Only publish to real PyPI on version tags
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/agent-baton
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Falls back to PYPI_API_TOKEN secret if OIDC trusted publishing is not configured
          password: ${{ secrets.PYPI_API_TOKEN }}
