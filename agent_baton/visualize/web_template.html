<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Baton &middot; Execution Topology</title>
<style>
/* =====================================================================
   Design Tokens -- GitHub Dark + neon accents
   ===================================================================== */
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-hover: #1c2128;
  --card: #1c2128;
  --border: #30363d;
  --border-subtle: #21262d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #656d76;

  --green: #3fb950;
  --green-dim: #238636;
  --green-glow: rgba(63,185,80,.35);
  --blue: #58a6ff;
  --blue-dim: #1f6feb;
  --blue-glow: rgba(88,166,255,.3);
  --red: #f85149;
  --red-dim: #da3633;
  --red-glow: rgba(248,81,73,.35);
  --yellow: #d29922;
  --yellow-dim: #9e6a03;
  --purple: #bc8cff;
  --purple-dim: #8957e5;
  --orange: #f0883e;
  --orange-dim: #bd561d;
  --gray: #484f58;
  --cyan: #58a6ff;

  --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',ui-monospace,monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --radius: 8px;
  --radius-sm: 4px;
  --radius-lg: 12px;
  --transition: 150ms cubic-bezier(.4,0,.2,1);
}

/* =====================================================================
   Reset & base
   ===================================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* =====================================================================
   Layout shell
   ===================================================================== */
.shell{display:flex;flex-direction:column;min-height:100vh}
.header-wrap{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1600px;margin:0 auto;padding:16px 28px}
.view-body{flex:1;position:relative;overflow:hidden}
.footer-wrap{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 28px}
.footer-inner{max-width:1600px;margin:0 auto}

/* =====================================================================
   Header
   ===================================================================== */
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
.hdr-title{font-size:1.35rem;font-weight:600;line-height:1.3;max-width:700px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hdr-id{font-family:var(--font-mono);font-size:.78rem;color:var(--text-muted);margin-top:2px}
.hdr-controls{display:flex;align-items:center;gap:12px;flex-shrink:0}

/* View toggle */
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.view-toggle button{background:none;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:.75rem;padding:6px 14px;cursor:pointer;transition:background var(--transition),color var(--transition);text-transform:uppercase;letter-spacing:.04em}
.view-toggle button:hover{background:var(--surface-hover)}
.view-toggle button.active{background:var(--blue-dim);color:#fff}

/* Badges */
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:500;font-family:var(--font-mono);padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.badge--risk-low{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.badge--risk-medium{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.2)}
.badge--risk-high{background:var(--orange-dim);color:#fff}
.badge--risk-critical{background:var(--red-dim);color:#fff;animation:badge-critical-pulse 2s ease-in-out infinite}
@keyframes badge-critical-pulse{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
.badge--budget{background:rgba(88,166,255,.08);color:var(--blue);border:1px solid rgba(88,166,255,.15)}
.badge--complexity{background:rgba(188,140,255,.08);color:var(--purple);border:1px solid rgba(188,140,255,.15)}
.badge--stack{background:rgba(121,192,255,.08);color:var(--cyan);border:1px solid rgba(121,192,255,.15)}
.badge--type{background:rgba(139,148,158,.08);color:var(--text-dim);border:1px solid rgba(139,148,158,.12)}
.badge--source{background:rgba(139,148,158,.06);color:var(--text-muted);border:1px solid rgba(139,148,158,.1)}
.badge--mode{background:rgba(63,185,80,.06);color:var(--green);border:1px solid rgba(63,185,80,.12)}

/* Progress bar */
.progress-row{display:flex;align-items:center;gap:14px}
.progress-pct{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;flex-shrink:0;min-width:52px}
.progress-track{flex:1;height:6px;background:var(--border-subtle);border-radius:3px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:3px;transition:width 600ms cubic-bezier(.22,1,.36,1);position:relative}
.progress-fill--running{background:linear-gradient(90deg,var(--blue-dim),var(--blue));animation:bar-shimmer 2s linear infinite}
.progress-fill--complete{background:linear-gradient(90deg,var(--green-dim),var(--green))}
.progress-fill--failed{background:linear-gradient(90deg,var(--red-dim),var(--red))}
.progress-fill--pending{background:var(--gray)}
@keyframes bar-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.progress-fill--running{background-size:200% 100%;background-image:linear-gradient(90deg,var(--blue-dim),var(--blue),var(--blue-dim))}

.metrics-row{display:flex;gap:18px;font-family:var(--font-mono);font-size:.73rem;color:var(--text-dim);margin-top:6px;flex-wrap:wrap;align-items:center}
.metrics-row .val{color:var(--text);font-weight:600}
.metrics-row .lbl{color:var(--text-muted);margin-left:3px}
.exec-status{display:inline-flex;align-items:center;gap:5px;margin-left:auto}

/* Status dots */
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot--pending{background:var(--gray)}
.dot--running{background:var(--blue);animation:dot-breathe 1.8s ease-in-out infinite}
.dot--complete{background:var(--green)}
.dot--failed{background:var(--red)}
.dot--skipped{background:var(--text-muted)}
.dot--interrupted{background:var(--orange)}
.dot--interacting{background:var(--purple);animation:dot-breathe 1.8s ease-in-out infinite}
.dot--gate_pending{background:var(--yellow);animation:dot-breathe 1.8s ease-in-out infinite}
.dot--passed{background:var(--green)}
.dot--not_started{background:var(--gray)}
@keyframes dot-breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}

/* =====================================================================
   DAG View
   ===================================================================== */
.dag-viewport{width:100%;height:100%;overflow:auto;cursor:grab;position:absolute;inset:0}
.dag-viewport.grabbing{cursor:grabbing}
.dag-canvas{position:relative;transform-origin:0 0}
.dag-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.dag-svg .edge-path{fill:none;stroke-width:2;stroke-linecap:round;transition:opacity .2s}
.dag-svg .edge-path--critical{stroke-width:3.5}
.dag-svg .edge-particle{r:3;opacity:.9}
.dag-svg .edge-label{font-family:var(--font-mono);font-size:10px;fill:var(--text-muted);pointer-events:auto;cursor:default}
.dag-dimmed .edge-path{opacity:.08}
.dag-dimmed .dag-node{opacity:.15}
.dag-dimmed .dag-gate{opacity:.15}
.dag-dimmed .dag-phase-lane{opacity:.3}
.dag-dimmed .edge-path.hl,.dag-dimmed .dag-node.hl,.dag-dimmed .dag-gate.hl{opacity:1}

/* Phase lanes */
.dag-phase-lane{position:absolute;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);transition:opacity .2s}
.dag-phase-label{position:absolute;font-family:var(--font-mono);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);writing-mode:vertical-rl;transform:rotate(180deg);padding:8px 0}

/* Nodes */
.dag-node{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:box-shadow .2s,opacity .2s,border-color .2s,transform .2s;overflow:hidden;display:flex;flex-direction:column}
.dag-node:hover{border-color:var(--blue);transform:translateY(-1px)}
.dag-node--running{box-shadow:0 0 12px var(--blue-glow);animation:node-pulse 2.5s ease-in-out infinite}
.dag-node--complete{border-color:var(--green-dim)}
.dag-node--failed{border-color:var(--red-dim);box-shadow:0 0 10px var(--red-glow)}
@keyframes node-pulse{0%,100%{box-shadow:0 0 12px var(--blue-glow)}50%{box-shadow:0 0 24px var(--blue-glow)}}

.node-top{display:flex;align-items:center;gap:6px;padding:8px 10px 4px;flex-wrap:wrap}
.node-id{font-family:var(--font-mono);font-size:.68rem;font-weight:600;color:var(--text-muted);background:var(--bg);padding:1px 6px;border-radius:3px}
.node-agent{font-size:.82rem;font-weight:600;color:var(--cyan);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-model{font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted);background:rgba(139,148,158,.08);padding:1px 5px;border-radius:3px}
.node-status-row{display:flex;align-items:center;gap:5px;padding:0 10px 4px;font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.03em}
.node-badges{display:flex;gap:4px;padding:0 10px 6px;flex-wrap:wrap}
.node-type-badge{font-family:var(--font-mono);font-size:.6rem;padding:1px 6px;border-radius:3px;background:rgba(139,148,158,.08);color:var(--text-muted)}
.node-parallel-badge{font-family:var(--font-mono);font-size:.6rem;padding:1px 6px;border-radius:3px;background:rgba(188,140,255,.12);color:var(--purple);font-weight:600}
.node-metrics{display:flex;gap:8px;padding:4px 10px 6px;font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted);border-top:1px solid var(--border-subtle);margin-top:auto}
.node-metrics .val{color:var(--text-dim)}

/* Team chips inside node */
.node-team{padding:4px 10px 6px;display:flex;flex-wrap:wrap;gap:3px;border-top:1px solid var(--border-subtle)}
.team-chip{display:inline-flex;align-items:center;gap:3px;font-size:.6rem;font-family:var(--font-mono);padding:2px 6px;border-radius:3px;background:var(--bg);border:1px solid var(--border-subtle)}
.team-chip .role{color:var(--text-muted);text-transform:uppercase;font-size:.55rem;letter-spacing:.02em}
.team-chip .name{color:var(--cyan)}

/* Gate diamonds in DAG */
.dag-gate{position:absolute;cursor:default;transition:opacity .2s}
.gate-diamond{width:28px;height:28px;transform:rotate(45deg);border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .2s,box-shadow .2s}
.gate-diamond--passed{background:rgba(63,185,80,.15);border-color:var(--green)}
.gate-diamond--failed{background:rgba(248,81,73,.15);border-color:var(--red)}
.gate-diamond--pending{background:rgba(139,148,158,.06);border-style:dashed;border-color:var(--gray)}
.gate-label{position:absolute;top:34px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);white-space:nowrap}

/* Node detail panel */
.node-detail-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);animation:fade-in .15s ease}
.node-detail-overlay.open{display:flex;align-items:center;justify-content:center}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.node-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:560px;width:90%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slide-up .2s ease}
@keyframes slide-up{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.node-detail h3{font-size:1rem;margin-bottom:4px;color:var(--cyan)}
.node-detail .detail-id{font-family:var(--font-mono);font-size:.75rem;color:var(--text-muted);margin-bottom:12px}
.detail-section{margin-bottom:14px}
.detail-section-label{font-family:var(--font-mono);font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.detail-text{font-size:.85rem;color:var(--text-dim);line-height:1.5}
.detail-file{font-family:var(--font-mono);font-size:.75rem;color:var(--cyan);padding:2px 0}
.detail-error{font-family:var(--font-mono);font-size:.78rem;color:var(--red);background:rgba(248,81,73,.06);padding:8px 10px;border-radius:var(--radius-sm);border:1px solid rgba(248,81,73,.15)}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;line-height:1}
.detail-metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.detail-metric{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.detail-metric .val{font-family:var(--font-mono);font-size:1rem;font-weight:700;color:var(--text)}
.detail-metric .lbl{font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}

/* Edge tooltip */
.edge-tooltip{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-family:var(--font-mono);font-size:.7rem;color:var(--text-dim);z-index:150;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap}

/* =====================================================================
   Timeline View (improved from original)
   ===================================================================== */
.timeline-container{max-width:960px;margin:0 auto;padding:24px 24px 48px}
.timeline-phases{display:flex;flex-direction:column;gap:12px}
.tl-phase{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tl-phase[open]>.tl-phase-hdr{border-bottom:1px solid var(--border-subtle)}
.tl-phase-hdr{display:flex;align-items:center;gap:10px;padding:14px 20px;cursor:pointer;user-select:none;list-style:none;transition:background var(--transition)}
.tl-phase-hdr:hover{background:var(--surface-hover)}
.tl-phase-hdr::-webkit-details-marker,.tl-phase-hdr::marker{display:none;content:''}
.tl-chevron{width:16px;height:16px;color:var(--text-muted);transition:transform var(--transition);flex-shrink:0}
.tl-phase[open]>.tl-phase-hdr .tl-chevron{transform:rotate(90deg)}
.tl-phase-num{font-size:.73rem;font-family:var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.tl-phase-name{font-size:.93rem;font-weight:600;flex:1;min-width:0}
.tl-phase-status{font-size:.73rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.tl-body{padding:12px 20px 16px}
.tl-steps{display:flex;flex-direction:column;gap:8px}
.tl-step{background:var(--bg);border:1px solid var(--border-subtle);border-left:4px solid var(--gray);border-radius:var(--radius-sm);padding:12px 16px;transition:border-color var(--transition),background var(--transition)}
.tl-step:hover{background:var(--surface-hover)}
.tl-step--running{border-left-color:var(--blue)}
.tl-step--complete{border-left-color:var(--green)}
.tl-step--failed{border-left-color:var(--red)}
.tl-step--skipped{border-left-color:var(--text-muted)}
.tl-step--interrupted{border-left-color:var(--orange)}
.tl-step--interacting{border-left-color:var(--purple)}
.tl-step-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tl-step-id{font-family:var(--font-mono);font-size:.78rem;font-weight:600;color:var(--text-dim);flex-shrink:0}
.tl-step-agent{font-size:.85rem;font-weight:600;color:var(--cyan)}
.tl-step-model{font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);background:rgba(139,148,158,.08);padding:1px 6px;border-radius:3px;flex-shrink:0}
.tl-step-status{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;margin-left:auto;flex-shrink:0}
.tl-step-desc{font-size:.82rem;color:var(--text-dim);line-height:1.45;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-step-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tl-tag{font-size:.7rem;font-family:var(--font-mono);color:var(--text-muted);background:rgba(139,148,158,.06);padding:2px 8px;border-radius:3px}
.tl-tag--parallel{color:var(--purple);background:rgba(188,140,255,.1)}
.tl-step-metrics{display:flex;gap:14px;margin-top:6px;font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted)}
.tl-step-metrics .val{color:var(--text-dim)}
.tl-step-error{margin-top:6px;font-size:.78rem;color:var(--red);font-family:var(--font-mono);background:rgba(248,81,73,.06);padding:6px 10px;border-radius:var(--radius-sm);border:1px solid rgba(248,81,73,.15)}
.tl-team{margin-top:8px;margin-left:12px;padding-left:14px;border-left:2px solid var(--border)}
.tl-team-member{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.8rem;flex-wrap:wrap}
.tl-team-member+.tl-team-member{border-top:1px solid var(--border-subtle)}
.tl-team-member-id{font-family:var(--font-mono);font-size:.72rem;color:var(--text-muted);flex-shrink:0}
.tl-team-member-agent{font-weight:600;color:var(--cyan)}
.tl-team-member-role{font-family:var(--font-mono);font-size:.68rem;color:var(--text-muted);background:rgba(139,148,158,.08);padding:1px 6px;border-radius:3px;text-transform:uppercase}
.tl-team-member-desc{font-size:.78rem;color:var(--text-dim);flex-basis:100%;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.tl-gate{margin-top:12px;padding:10px 14px;background:rgba(139,148,158,.04);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-gate-icon{width:16px;height:16px;flex-shrink:0}
.tl-gate-icon--pending{color:var(--text-muted)}
.tl-gate-icon--passed{color:var(--green)}
.tl-gate-icon--failed{color:var(--red)}
.tl-gate-type{font-family:var(--font-mono);font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim)}
.tl-gate-desc{font-size:.78rem;color:var(--text-dim);flex:1}
.tl-gate-status{font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.04em}
.tl-gate-status--pending{color:var(--text-muted)}
.tl-gate-status--passed{color:var(--green)}
.tl-gate-status--failed{color:var(--red)}
.tl-gate-cmd{flex-basis:100%;font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);margin-top:2px}

/* =====================================================================
   Footer
   ===================================================================== */
.footer-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.footer-label{font-size:.7rem;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.footer-agents{display:flex;flex-wrap:wrap;gap:4px}
.agent-chip{font-family:var(--font-mono);font-size:.68rem;color:var(--cyan);background:rgba(121,192,255,.06);padding:2px 9px;border-radius:20px;border:1px solid rgba(121,192,255,.1)}
.footer-meta{text-align:right;font-family:var(--font-mono);font-size:.72rem;color:var(--text-muted)}
.footer-meta a{color:var(--cyan);text-decoration:none}
.footer-meta a:hover{text-decoration:underline}

/* =====================================================================
   Responsive
   ===================================================================== */
@media(max-width:768px){
  .dag-viewport{display:none!important}
  .timeline-container{display:block!important}
  .view-toggle{display:none!important}
  .header-inner{padding:12px 14px}
  .hdr-title{font-size:1.1rem}
  .metrics-row{gap:10px}
  .tl-step-status{margin-left:0;flex-basis:100%;margin-top:2px}
  .footer-row{flex-direction:column}
  .footer-meta{text-align:left}
}
@media(min-width:769px) and (max-width:1200px){
  .dag-node{min-width:150px!important}
}
</style>
</head>
<body>
<script>window.__BATON_PLAN__ = __BATON_PLAN_DATA__;</script>

<div class="shell" id="app">
  <!-- Populated by script -->
</div>

<!-- Detail overlay (reused) -->
<div class="node-detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-label="Step details">
  <div class="node-detail" id="detailPanel"></div>
</div>
<div class="edge-tooltip" id="edgeTooltip"></div>

<script>
(function(){
'use strict';

var P = window.__BATON_PLAN__;
if(!P){document.getElementById('app').textContent='No plan data found.';return;}

/* -----------------------------------------------------------------
   Helpers
   ----------------------------------------------------------------- */
function esc(s){if(s==null)return '';var d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}
function truncate(s,n){if(!s)return '';return s.length>n?s.slice(0,n)+'...':s;}
function fmtDur(sec){if(!sec||sec<=0)return '--';if(sec<60)return sec.toFixed(1)+'s';var m=Math.floor(sec/60),s2=Math.round(sec%60);if(m<60)return m+'m '+s2+'s';var h=Math.floor(m/60);m=m%60;return h+'h '+m+'m';}
function fmtTok(n){if(!n)return '0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
function fmtCost(u){if(!u)return '$0.00';return '$'+u.toFixed(2);}
function fmtDate(iso){if(!iso)return '--';try{var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}}
function statusColor(s){var m={'pending':'var(--gray)','running':'var(--blue)','complete':'var(--green)','failed':'var(--red)','skipped':'var(--text-muted)','interrupted':'var(--orange)','interacting':'var(--purple)','gate_pending':'var(--yellow)','not_started':'var(--gray)','passed':'var(--green)'};return m[s]||'var(--text-dim)';}
function statusHex(s){var m={'pending':'#484f58','running':'#58a6ff','complete':'#3fb950','failed':'#f85149','skipped':'#656d76','interrupted':'#f0883e','interacting':'#bc8cff','gate_pending':'#d29922','not_started':'#484f58','passed':'#3fb950'};return m[s]||'#8b949e';}

/* -----------------------------------------------------------------
   Build all steps map & adjacency
   ----------------------------------------------------------------- */
var phases=P.phases||[];
var allSteps=[];
var stepMap={};
var phaseOfStep={};
phases.forEach(function(ph){
  (ph.steps||[]).forEach(function(st){
    allSteps.push(st);
    stepMap[st.step_id]=st;
    phaseOfStep[st.step_id]=ph.phase_id;
  });
});

/* Adjacency: child -> parents, parent -> children */
var parents={};var children={};
allSteps.forEach(function(st){
  parents[st.step_id]=st.depends_on||[];
  if(!children[st.step_id])children[st.step_id]=[];
  (st.depends_on||[]).forEach(function(dep){
    if(!children[dep])children[dep]=[];
    children[dep].push(st.step_id);
  });
});

/* -----------------------------------------------------------------
   DAG Layout Algorithm
   ----------------------------------------------------------------- */
function computeDAGLayout(){
  /* 1. Topological sort (Kahn's) */
  var inDeg={};
  allSteps.forEach(function(st){inDeg[st.step_id]=0;});
  allSteps.forEach(function(st){
    (st.depends_on||[]).forEach(function(dep){
      if(inDeg[st.step_id]!==undefined)inDeg[st.step_id]++;
    });
  });
  var queue=[];
  allSteps.forEach(function(st){if(inDeg[st.step_id]===0)queue.push(st.step_id);});
  var topoOrder=[];
  while(queue.length){
    queue.sort(); /* deterministic */
    var n=queue.shift();
    topoOrder.push(n);
    (children[n]||[]).forEach(function(c){
      inDeg[c]--;
      if(inDeg[c]===0)queue.push(c);
    });
  }

  /* 2. Assign columns: col = max(col of parents) + 1, or 0 if no parents */
  var col={};
  topoOrder.forEach(function(sid){
    var ps=parents[sid]||[];
    if(!ps.length){col[sid]=0;}
    else{
      var mx=0;
      ps.forEach(function(p){if(col[p]!==undefined&&col[p]>mx)mx=col[p];});
      col[sid]=mx+1;
    }
  });

  /* 3. Group by column, then by phase within each column for row assignment */
  var maxCol=0;
  topoOrder.forEach(function(sid){if(col[sid]>maxCol)maxCol=col[sid];});

  var colGroups={};
  for(var c=0;c<=maxCol;c++)colGroups[c]=[];
  topoOrder.forEach(function(sid){colGroups[col[sid]].push(sid);});

  /* Sort each column group by phase_id then step_id for stable ordering */
  for(var c2=0;c2<=maxCol;c2++){
    colGroups[c2].sort(function(a,b){
      var pa=phaseOfStep[a]||0,pb=phaseOfStep[b]||0;
      if(pa!==pb)return pa-pb;
      return a<b?-1:1;
    });
  }

  /* 4. Assign row within column */
  var row={};
  for(var c3=0;c3<=maxCol;c3++){
    colGroups[c3].forEach(function(sid,idx){row[sid]=idx;});
  }

  /* 5. Compute phase bounds (min/max row per phase per column, for lane drawing) */
  var phaseBounds={};
  phases.forEach(function(ph){phaseBounds[ph.phase_id]={minRow:Infinity,maxRow:-Infinity,minCol:Infinity,maxCol:-Infinity};});
  allSteps.forEach(function(st){
    var pid=phaseOfStep[st.step_id];
    var b=phaseBounds[pid];
    if(row[st.step_id]<b.minRow)b.minRow=row[st.step_id];
    if(row[st.step_id]>b.maxRow)b.maxRow=row[st.step_id];
    if(col[st.step_id]<b.minCol)b.minCol=col[st.step_id];
    if(col[st.step_id]>b.maxCol)b.maxCol=col[st.step_id];
  });

  return {topoOrder:topoOrder,col:col,row:row,maxCol:maxCol,colGroups:colGroups,phaseBounds:phaseBounds};
}

/* -----------------------------------------------------------------
   Compute critical path (longest path from any source to any sink)
   ----------------------------------------------------------------- */
function computeCriticalPath(){
  var dist={};var prev={};
  allSteps.forEach(function(st){dist[st.step_id]=0;prev[st.step_id]=null;});
  /* Process in topo order */
  var layout=computeDAGLayout();
  layout.topoOrder.forEach(function(sid){
    (children[sid]||[]).forEach(function(cid){
      var w=1;/* uniform weight */
      if(dist[sid]+w>dist[cid]){
        dist[cid]=dist[sid]+w;
        prev[cid]=sid;
      }
    });
  });
  /* Find the sink with max dist */
  var maxDist=0,sink=null;
  allSteps.forEach(function(st){if(dist[st.step_id]>maxDist){maxDist=dist[st.step_id];sink=st.step_id;}});
  /* Trace back */
  var path=new Set();
  var cur=sink;
  while(cur){path.add(cur);cur=prev[cur];}
  return path;
}

/* -----------------------------------------------------------------
   Build DAG view
   ----------------------------------------------------------------- */
function buildDAG(){
  var layout=computeDAGLayout();
  var criticalPath=computeCriticalPath();

  /* Sizing */
  var nodeW=195,nodeH=90,gapX=80,gapY=24,padX=60,padY=50;
  var teamNodeH=120; /* taller for team steps */
  var laneMarginLeft=30;

  /* Determine max rows in any column for total height */
  var maxRows=0;
  for(var c=0;c<=layout.maxCol;c++){
    if(layout.colGroups[c].length>maxRows)maxRows=layout.colGroups[c].length;
  }

  /* Calculate node height per step (team steps are taller) */
  function nodeHeight(sid){
    var st=stepMap[sid];
    if(st&&st.team&&st.team.length)return teamNodeH;
    if(st&&st.tokens_used)return nodeH+20;
    return nodeH;
  }

  /* Compute Y positions: stack within column, accounting for variable height */
  var yPos={};
  for(var c2=0;c2<=layout.maxCol;c2++){
    var cumY=0;
    layout.colGroups[c2].forEach(function(sid){
      yPos[sid]=cumY;
      cumY+=nodeHeight(sid)+gapY;
    });
  }

  /* Compute positions */
  var positions={};
  var canvasW=0,canvasH=0;
  allSteps.forEach(function(st){
    var x=padX+laneMarginLeft+layout.col[st.step_id]*(nodeW+gapX);
    var y=padY+yPos[st.step_id];
    positions[st.step_id]={x:x,y:y,w:nodeW,h:nodeHeight(st.step_id)};
    if(x+nodeW>canvasW)canvasW=x+nodeW;
    if(y+nodeHeight(st.step_id)>canvasH)canvasH=y+nodeHeight(st.step_id);
  });
  canvasW+=padX+60;
  canvasH+=padY+80;

  /* Gate positions (between phases along the rightmost column of the phase) */
  var gatePositions=[];
  phases.forEach(function(ph,idx){
    if(!ph.gate)return;
    var b=layout.phaseBounds[ph.phase_id];
    if(b.maxCol===-Infinity)return;
    /* Place gate to the right of the rightmost node in this phase */
    var gx=padX+laneMarginLeft+(b.maxCol+1)*(nodeW+gapX)-gapX/2-14;
    /* Vertically centered in the phase */
    var minY=Infinity,maxY=0;
    (ph.steps||[]).forEach(function(st){
      var p=positions[st.step_id];
      if(p){
        if(p.y<minY)minY=p.y;
        if(p.y+p.h>maxY)maxY=p.y+p.h;
      }
    });
    var gy=(minY+maxY)/2-14;
    gatePositions.push({phase:ph,x:gx,y:gy,status:ph.gate.status||'pending'});
    if(gx+60>canvasW)canvasW=gx+60;
  });

  /* Phase lane backgrounds */
  var laneHTML='';
  var laneColors=['rgba(88,166,255,.03)','rgba(188,140,255,.03)','rgba(63,185,80,.03)','rgba(240,136,62,.03)','rgba(121,192,255,.03)'];
  phases.forEach(function(ph,idx){
    var stepsInPhase=ph.steps||[];
    if(!stepsInPhase.length)return;
    var minX=Infinity,maxX=0,minY2=Infinity,maxY2=0;
    stepsInPhase.forEach(function(st){
      var p=positions[st.step_id];
      if(!p)return;
      if(p.x<minX)minX=p.x;
      if(p.x+p.w>maxX)maxX=p.x+p.w;
      if(p.y<minY2)minY2=p.y;
      if(p.y+p.h>maxY2)maxY2=p.y+p.h;
    });
    var pad=14;
    laneHTML+='<div class="dag-phase-lane" style="left:'+(minX-pad)+'px;top:'+(minY2-pad)+'px;width:'+(maxX-minX+pad*2)+'px;height:'+(maxY2-minY2+pad*2)+'px;background:'+laneColors[idx%laneColors.length]+'"></div>';
    laneHTML+='<div class="dag-phase-label" style="left:'+(minX-pad-22)+'px;top:'+(minY2-pad)+'px;height:'+(maxY2-minY2+pad*2)+'px">Phase '+esc(ph.phase_id)+' &middot; '+esc(ph.name)+'</div>';
  });

  /* Build SVG edges */
  var edgePaths=[];
  allSteps.forEach(function(st){
    (st.depends_on||[]).forEach(function(dep){
      if(!positions[dep]||!positions[st.step_id])return;
      var src=positions[dep];
      var tgt=positions[st.step_id];
      var x1=src.x+src.w;
      var y1=src.y+src.h/2;
      var x2=tgt.x;
      var y2=tgt.y+tgt.h/2;
      var dx=Math.abs(x2-x1);
      var cpOff=Math.max(dx*0.4,30);
      var d='M'+x1+','+y1+' C'+(x1+cpOff)+','+y1+' '+(x2-cpOff)+','+y2+' '+x2+','+y2;
      var srcStatus=(stepMap[dep]||{}).status||'pending';
      var isCritical=criticalPath.has(dep)&&criticalPath.has(st.step_id);
      edgePaths.push({d:d,from:dep,to:st.step_id,status:srcStatus,critical:isCritical,x1:x1,y1:y1,x2:x2,y2:y2});
    });
  });

  var svgHTML='<svg class="dag-svg" width="'+canvasW+'" height="'+canvasH+'" xmlns="http://www.w3.org/2000/svg">';
  /* Gradient definitions */
  svgHTML+='<defs>';
  edgePaths.forEach(function(e,i){
    var c1=statusHex(e.status);
    var c2=statusHex((stepMap[e.to]||{}).status||'pending');
    svgHTML+='<linearGradient id="eg'+i+'" x1="0%" y1="0%" x2="100%" y2="0%">';
    svgHTML+='<stop offset="0%" stop-color="'+c1+'" stop-opacity="0.7"/>';
    svgHTML+='<stop offset="100%" stop-color="'+c2+'" stop-opacity="0.7"/>';
    svgHTML+='</linearGradient>';
  });
  svgHTML+='</defs>';
  edgePaths.forEach(function(e,i){
    var cls='edge-path';
    if(e.critical)cls+=' edge-path--critical';
    svgHTML+='<path class="'+cls+'" d="'+e.d+'" stroke="url(#eg'+i+')" data-from="'+esc(e.from)+'" data-to="'+esc(e.to)+'" style="stroke-dasharray:1000;stroke-dashoffset:1000"/>';
    /* Animated particle for running edges */
    if(e.status==='running'){
      svgHTML+='<circle class="edge-particle" fill="'+statusHex('running')+'">';
      svgHTML+='<animateMotion dur="2s" repeatCount="indefinite" path="'+e.d+'"/>';
      svgHTML+='</circle>';
    }
  });
  svgHTML+='</svg>';

  /* Build node HTML */
  var nodesHTML='';
  layout.topoOrder.forEach(function(sid,topoIdx){
    var st=stepMap[sid];
    if(!st)return;
    var pos=positions[sid];
    var status=st.status||'pending';
    var cls='dag-node';
    if(status==='running')cls+=' dag-node--running';
    else if(status==='complete')cls+=' dag-node--complete';
    else if(status==='failed')cls+=' dag-node--failed';

    nodesHTML+='<div class="'+cls+'" data-step="'+esc(sid)+'" style="left:'+pos.x+'px;top:'+pos.y+'px;width:'+pos.w+'px;opacity:0;animation:node-appear .4s ease '+(topoIdx*80)+'ms forwards" tabindex="0" role="button" aria-label="Step '+esc(sid)+': '+esc(st.agent_name)+'">';

    /* Top row */
    nodesHTML+='<div class="node-top">';
    nodesHTML+='<span class="node-id">'+esc(sid)+'</span>';
    nodesHTML+='<span class="node-agent">'+esc(st.agent_name)+'</span>';
    if(st.model)nodesHTML+='<span class="node-model">'+esc(st.model)+'</span>';
    nodesHTML+='</div>';

    /* Status row */
    nodesHTML+='<div class="node-status-row" style="color:'+statusColor(status)+'">';
    nodesHTML+='<span class="dot dot--'+esc(status)+'"></span> '+esc(status);
    nodesHTML+='</div>';

    /* Badges */
    var hasBadges=st.step_type||st.parallel_safe;
    if(hasBadges){
      nodesHTML+='<div class="node-badges">';
      if(st.step_type)nodesHTML+='<span class="node-type-badge">'+esc(st.step_type)+'</span>';
      if(st.parallel_safe)nodesHTML+='<span class="node-parallel-badge">&parallel;</span>';
      nodesHTML+='</div>';
    }

    /* Team chips */
    if(st.team&&st.team.length){
      nodesHTML+='<div class="node-team">';
      st.team.forEach(function(m){
        nodesHTML+='<span class="team-chip"><span class="dot dot--'+esc(m.status||'pending')+'" style="width:5px;height:5px"></span><span class="role">'+esc(m.role)+'</span><span class="name">'+esc(m.agent_name)+'</span></span>';
      });
      nodesHTML+='</div>';
    }

    /* Metrics */
    if(st.tokens_used||st.duration_seconds){
      nodesHTML+='<div class="node-metrics">';
      if(st.tokens_used)nodesHTML+='<span><span class="val">'+fmtTok(st.tokens_used)+'</span> tok</span>';
      if(st.duration_seconds)nodesHTML+='<span><span class="val">'+fmtDur(st.duration_seconds)+'</span></span>';
      if(st.files_changed&&st.files_changed.length)nodesHTML+='<span><span class="val">'+st.files_changed.length+'</span> files</span>';
      nodesHTML+='</div>';
    }

    nodesHTML+='</div>';
  });

  /* Gate diamonds */
  var gatesHTML='';
  gatePositions.forEach(function(g){
    var gs=g.status;
    gatesHTML+='<div class="dag-gate" style="left:'+g.x+'px;top:'+g.y+'px">';
    gatesHTML+='<div class="gate-diamond gate-diamond--'+esc(gs)+'"></div>';
    gatesHTML+='<div class="gate-label">'+esc(g.phase.gate.gate_type)+' gate</div>';
    gatesHTML+='</div>';
  });

  return '<div class="dag-viewport" id="dagViewport"><div class="dag-canvas" id="dagCanvas" style="width:'+canvasW+'px;height:'+canvasH+'px;position:relative">'+laneHTML+svgHTML+nodesHTML+gatesHTML+'</div></div>';
}

styleTag.textContent='@keyframes node-appear{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}';

/* -----------------------------------------------------------------
   Build Timeline view
   ----------------------------------------------------------------- */
function buildTimeline(){
  var h='<div class="timeline-container" id="timelineView" style="display:none">';
  h+='<div class="timeline-phases" role="list" aria-label="Execution phases">';

  phases.forEach(function(phase){
    var ps=phase.status||'pending';
    var isOpen=ps!=='complete';
    h+='<details class="tl-phase" role="listitem"'+(isOpen?' open':'')+'>';
    h+='<summary class="tl-phase-hdr">';
    h+=chevronSvg;
    h+='<span class="dot dot--'+esc(ps)+'" aria-hidden="true"></span>';
    h+='<span class="tl-phase-num">Phase '+esc(phase.phase_id)+'</span>';
    h+='<span class="tl-phase-name">'+esc(phase.name)+'</span>';
    if(phase.approval_required)h+='<span class="badge badge--risk-high" style="font-size:.63rem">Approval</span>';
    h+='<span class="tl-phase-status" style="color:'+statusColor(ps)+'">'+esc(ps.replace(/_/g,' '))+'</span>';
    h+='</summary>';
    h+='<div class="tl-body">';

    var steps=phase.steps||[];
    if(steps.length){
      h+='<div class="tl-steps">';
      steps.forEach(function(step){
        var ss=step.status||'pending';
        h+='<div class="tl-step tl-step--'+esc(ss)+'">';
        h+='<div class="tl-step-hdr">';
        h+='<span class="tl-step-id">'+esc(step.step_id)+'</span>';
        h+='<span class="dot dot--'+esc(ss)+'" aria-hidden="true"></span>';
        h+='<span class="tl-step-agent">'+esc(step.agent_name)+'</span>';
        if(step.model)h+='<span class="tl-step-model">'+esc(step.model)+'</span>';
        h+='<span class="tl-step-status" style="color:'+statusColor(ss)+'">'+esc(ss)+'</span>';
        h+='</div>';
        if(step.task_description)h+='<div class="tl-step-desc">'+esc(step.task_description)+'</div>';

        var hasMeta=step.parallel_safe||(step.depends_on&&step.depends_on.length)||step.step_type;
        if(hasMeta){
          h+='<div class="tl-step-meta">';
          if(step.parallel_safe)h+='<span class="tl-tag tl-tag--parallel">&parallel; parallel-safe</span>';
          if(step.depends_on&&step.depends_on.length)h+='<span class="tl-tag">depends: '+esc(step.depends_on.join(', '))+'</span>';
          if(step.step_type)h+='<span class="tl-tag">'+esc(step.step_type)+'</span>';
          h+='</div>';
        }

        if(step.tokens_used||step.duration_seconds){
          h+='<div class="tl-step-metrics">';
          if(step.tokens_used)h+='<span>tokens <span class="val">'+fmtTok(step.tokens_used)+'</span></span>';
          if(step.duration_seconds)h+='<span>time <span class="val">'+fmtDur(step.duration_seconds)+'</span></span>';
          if(step.files_changed&&step.files_changed.length)h+='<span>files <span class="val">'+step.files_changed.length+'</span></span>';
          h+='</div>';
        }

        if(step.error)h+='<div class="tl-step-error">'+esc(truncate(step.error,300))+'</div>';

        if(step.team&&step.team.length){
          h+='<div class="tl-team" role="list" aria-label="Team members">';
          step.team.forEach(function(m){
            var ms=m.status||'pending';
            h+='<div class="tl-team-member" role="listitem">';
            h+='<span class="dot dot--'+esc(ms)+'" aria-hidden="true"></span>';
            h+='<span class="tl-team-member-id">'+esc(m.member_id)+'</span>';
            h+='<span class="tl-team-member-agent">'+esc(m.agent_name)+'</span>';
            h+='<span class="tl-team-member-role">'+esc(m.role)+'</span>';
            if(m.task_description)h+='<span class="tl-team-member-desc">'+esc(m.task_description)+'</span>';
            h+='</div>';
          });
          h+='</div>';
        }

        h+='</div>';
      });
      h+='</div>';
    }

    if(phase.gate){
      var gs=phase.gate.status||'pending';
      h+='<div class="tl-gate">';
      h+=gateIconSvg(gs);
      h+='<span class="tl-gate-type">'+esc(phase.gate.gate_type)+' gate</span>';
      if(phase.gate.description)h+='<span class="tl-gate-desc">'+esc(phase.gate.description)+'</span>';
      h+='<span class="tl-gate-status tl-gate-status--'+esc(gs)+'">'+esc(gs)+'</span>';
      if(phase.gate.command)h+='<span class="tl-gate-cmd">'+esc(phase.gate.command)+'</span>';
      h+='</div>';
    }

    h+='</div></details>';
  });

  h+='</div></div>';
  return h;
}

/* -----------------------------------------------------------------
   Assemble & mount
   ----------------------------------------------------------------- */
var appHTML=buildHeader();
appHTML+='<div class="view-body" id="viewBody">';
appHTML+=buildDAG();
appHTML+=buildTimeline();
appHTML+='</div>';
appHTML+=buildFooter();

document.getElementById('app').innerHTML=appHTML;

/* Update title */
if(P.task_summary)document.title=P.task_summary+' — Baton Topology';

/* -----------------------------------------------------------------
   View toggle
   ----------------------------------------------------------------- */
window.switchView=function(view){
  var dag=document.getElementById('dagViewport');
  var tl=document.getElementById('timelineView');
  var btnG=document.getElementById('btnGraph');
  var btnT=document.getElementById('btnTimeline');
  if(view==='dag'){
    if(dag)dag.style.display='';
    if(tl)tl.style.display='none';
    btnG.classList.add('active');btnG.setAttribute('aria-selected','true');
    btnT.classList.remove('active');btnT.setAttribute('aria-selected','false');
  }else{
    if(dag)dag.style.display='none';
    if(tl)tl.style.display='';
    btnG.classList.remove('active');btnG.setAttribute('aria-selected','false');
    btnT.classList.add('active');btnT.setAttribute('aria-selected','true');
  }
};

/* -----------------------------------------------------------------
   Edge draw-in animation
   ----------------------------------------------------------------- */
(function animateEdges(){
  var paths=document.querySelectorAll('.edge-path');
  paths.forEach(function(path,i){
    var length=path.getTotalLength();
    path.style.strokeDasharray=length;
    path.style.strokeDashoffset=length;
    var delay=i*120;
    setTimeout(function(){
      path.style.transition='stroke-dashoffset 0.6s cubic-bezier(.22,1,.36,1)';
      path.style.strokeDashoffset='0';
    },300+delay);
  });
})();

/* -----------------------------------------------------------------
   DAG pan/scroll + dependency highlight on hover
   ----------------------------------------------------------------- */
(function initDAGInteractions(){
  var viewport=document.getElementById('dagViewport');
  if(!viewport)return;

  /* Hover highlight: build upstream/downstream maps */
  function getAncestors(sid){
    var set=new Set();
    var stack=[sid];
    while(stack.length){
      var cur=stack.pop();
      (parents[cur]||[]).forEach(function(p){
        if(!set.has(p)){set.add(p);stack.push(p);}
      });
    }
    return set;
  }
  function getDescendants(sid){
    var set=new Set();
    var stack=[sid];
    while(stack.length){
      var cur=stack.pop();
      (children[cur]||[]).forEach(function(c){
        if(!set.has(c)){set.add(c);stack.push(c);}
      });
    }
    return set;
  }

  var canvas=document.getElementById('dagCanvas');
  var nodes=canvas.querySelectorAll('.dag-node');
  var edgePaths2=canvas.querySelectorAll('.edge-path');

  nodes.forEach(function(node){
    var sid=node.getAttribute('data-step');

    node.addEventListener('mouseenter',function(){
      var anc=getAncestors(sid);
      var desc=getDescendants(sid);
      var related=new Set(anc);
      desc.forEach(function(d){related.add(d);});
      related.add(sid);

      canvas.classList.add('dag-dimmed');
      /* Highlight related nodes */
      nodes.forEach(function(n){
        if(related.has(n.getAttribute('data-step')))n.classList.add('hl');
      });
      /* Highlight related edges */
      edgePaths2.forEach(function(ep){
        var from=ep.getAttribute('data-from');
        var to=ep.getAttribute('data-to');
        if(related.has(from)&&related.has(to))ep.classList.add('hl');
      });
    });

    node.addEventListener('mouseleave',function(){
      canvas.classList.remove('dag-dimmed');
      nodes.forEach(function(n){n.classList.remove('hl');});
      edgePaths2.forEach(function(ep){ep.classList.remove('hl');});
    });

    /* Click -> detail panel */
    node.addEventListener('click',function(){showDetail(sid);});
    node.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();showDetail(sid);}});
  });

  /* Edge hover tooltips */
  var tooltip=document.getElementById('edgeTooltip');
  /* Use invisible wider hit areas for edges */
  edgePaths2.forEach(function(ep){
    var hit=ep.cloneNode();
    hit.style.stroke='transparent';
    hit.style.strokeWidth='14';
    hit.style.pointerEvents='stroke';
    hit.style.strokeDasharray='none';
    hit.style.strokeDashoffset='0';
    hit.classList.remove('edge-path');
    ep.parentNode.appendChild(hit);

    hit.addEventListener('mouseenter',function(e){
      tooltip.style.display='block';
      tooltip.textContent='Step '+ep.getAttribute('data-from')+' → Step '+ep.getAttribute('data-to');
    });
    hit.addEventListener('mousemove',function(e){
      tooltip.style.left=(e.clientX+12)+'px';
      tooltip.style.top=(e.clientY-8)+'px';
    });
    hit.addEventListener('mouseleave',function(){
      tooltip.style.display='none';
    });
  });
})();

/* -----------------------------------------------------------------
   Node detail panel
   ----------------------------------------------------------------- */
function showDetail(sid){
  var st=stepMap[sid];
  if(!st)return;
  var overlay=document.getElementById('detailOverlay');
  var panel=document.getElementById('detailPanel');
  var status=st.status||'pending';

  var h='<button class="detail-close" aria-label="Close" onclick="closeDetail()">&times;</button>';
  h+='<h3>'+esc(st.agent_name)+'</h3>';
  h+='<div class="detail-id">Step '+esc(sid)+' &middot; <span style="color:'+statusColor(status)+'">'+esc(status)+'</span>';
  if(st.model)h+=' &middot; '+esc(st.model);
  h+='</div>';

  if(st.task_description){
    h+='<div class="detail-section"><div class="detail-section-label">Task</div>';
    h+='<div class="detail-text">'+esc(st.task_description)+'</div></div>';
  }

  if(st.expected_outcome){
    h+='<div class="detail-section"><div class="detail-section-label">Expected Outcome</div>';
    h+='<div class="detail-text">'+esc(st.expected_outcome)+'</div></div>';
  }

  if(st.outcome){
    h+='<div class="detail-section"><div class="detail-section-label">Outcome</div>';
    h+='<div class="detail-text">'+esc(st.outcome)+'</div></div>';
  }

  /* Metrics grid */
  h+='<div class="detail-section"><div class="detail-section-label">Metrics</div>';
  h+='<div class="detail-metrics-grid">';
  h+='<div class="detail-metric"><div class="val">'+fmtTok(st.tokens_used)+'</div><div class="lbl">Tokens</div></div>';
  h+='<div class="detail-metric"><div class="val">'+fmtDur(st.duration_seconds)+'</div><div class="lbl">Duration</div></div>';
  h+='<div class="detail-metric"><div class="val">'+((st.files_changed||[]).length)+'</div><div class="lbl">Files</div></div>';
  h+='</div></div>';

  /* Files changed */
  if(st.files_changed&&st.files_changed.length){
    h+='<div class="detail-section"><div class="detail-section-label">Files Changed</div>';
    st.files_changed.forEach(function(f){h+='<div class="detail-file">'+esc(f)+'</div>';});
    h+='</div>';
  }

  /* Deliverables */
  if(st.deliverables&&st.deliverables.length){
    h+='<div class="detail-section"><div class="detail-section-label">Deliverables</div>';
    st.deliverables.forEach(function(d){h+='<div class="detail-file">'+esc(d)+'</div>';});
    h+='</div>';
  }

  /* Dependencies */
  if(st.depends_on&&st.depends_on.length){
    h+='<div class="detail-section"><div class="detail-section-label">Dependencies</div>';
    h+='<div class="detail-text">'+esc(st.depends_on.join(', '))+'</div></div>';
  }

  /* Team */
  if(st.team&&st.team.length){
    h+='<div class="detail-section"><div class="detail-section-label">Team</div>';
    st.team.forEach(function(m){
      var ms=m.status||'pending';
      h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.82rem">';
      h+='<span class="dot dot--'+esc(ms)+'"></span>';
      h+='<span style="color:var(--cyan);font-weight:600">'+esc(m.agent_name)+'</span>';
      h+='<span style="font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);text-transform:uppercase">'+esc(m.role)+'</span>';
      if(m.task_description)h+='<span style="color:var(--text-dim);font-size:.78rem;margin-left:auto">'+esc(truncate(m.task_description,60))+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  /* Error */
  if(st.error){
    h+='<div class="detail-section"><div class="detail-section-label">Error</div>';
    h+='<div class="detail-error">'+esc(st.error)+'</div></div>';
  }

  panel.innerHTML=h;
  overlay.classList.add('open');
  /* Focus trap */
  panel.querySelector('.detail-close').focus();
}

window.closeDetail=function(){
  document.getElementById('detailOverlay').classList.remove('open');
};

/* Close on overlay click or Escape */
document.getElementById('detailOverlay').addEventListener('click',function(e){
  if(e.target===this)window.closeDetail();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')window.closeDetail();
});

/* -----------------------------------------------------------------
   Force timeline on mobile
   ----------------------------------------------------------------- */
if(window.innerWidth<769){
  window.switchView('timeline');
}

})();
</script>
