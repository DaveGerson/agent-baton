site_name: Agent Baton
site_description: Agent Baton is a project manager for Claude Code — plan with foresight, compose the right specialist team, dispatch the right agent at the right time, and keep work on track with checks and balances.
site_url: https://davegerson.github.io/agent-baton/
site_author: Dave Gerson
repo_url: https://github.com/DaveGerson/agent-baton
repo_name: DaveGerson/agent-baton
edit_uri: edit/master/docs/
copyright: Copyright &copy; 2026 Dave Gerson — All Rights Reserved

docs_dir: docs

# docs/internal/ is maintainer-only (see docs/CLAUDE.md) — keep it out of the
# published site.
exclude_docs: |
  internal/

# Link validation: the architecture/reference docs intentionally cross-link to
# repository source files (agent_baton/**, scripts/**, references/**, the root
# CLAUDE.md, audit/**) which live outside docs_dir and cannot resolve as
# documentation pages. Without relaxing these, `mkdocs build --strict` aborts
# on ~300 such links. Nav integrity stays strict; only cross-file link
# resolution is downgraded so strict builds still catch real nav/config
# problems without choking on by-design source references.
validation:
  nav:
    # reviews/, superpowers/, and other staged docs intentionally live in
    # docs_dir without a nav entry — don't fail strict on them.
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DaveGerson/agent-baton
  # Search-engine ownership verification.
  # Replace the empty strings below with the codes from each console
  # (do not include the surrounding <meta ...> wrapper — the theme adds it).
  # - Google Search Console: https://search.google.com/search-console → "URL prefix"
  #   property → choose "HTML tag" verification → copy the content="..." value.
  # - Bing Webmaster Tools: https://www.bing.com/webmasters → "Add a site" → choose
  #   "HTML Meta Tag" verification → copy the content="..." value.
  analytics:
    google_site_verification: "inBGhoYrfGtfXZnLdCJDyO6k_Ho1Vhb5NRemQx19rfw"
    bing_site_verification: ""

nav:
  - Home: index.md
  - The Four Pillars: pillars.md
  - Getting Started:
      - Orchestrator Usage: orchestrator-usage.md
      - Agent Roster: agent-roster.md
      - First Run: examples/first-run.md
  - Architecture:
      - Overview: architecture.md
      - Engine & Runtime: engine-and-runtime.md
      - Storage, Sync, & PMO: storage-sync-and-pmo.md
      - Governance, Knowledge, & Events: governance-knowledge-and-events.md
      - Observe, Learn, & Improve: observe-learn-and-improve.md
      - Invariants: invariants.md
      - Terminology: terminology.md
      - Design Decisions: design-decisions.md
      - Architecture (deep dives):
          - High-Level Design: architecture/high-level-design.md
          - Technical Design: architecture/technical-design.md
          - Package Layout: architecture/package-layout.md
          - State Machine: architecture/state-machine.md
  - Reference:
      - API Reference: api-reference.md
      - CLI Reference: cli-reference.md
      - Troubleshooting: troubleshooting.md
  - Operations:
      - Production Readiness: PRODUCTION_READINESS.md
      - Daemon Mode Evaluation: daemon-mode-evaluation.md
      - Pyright Diagnostics Triage: pyright-diagnostics-triage.md
      - Engine Bugs: baton-engine-bugs.md
      - FinOps & Chargeback: finops-chargeback.md
  - Specifications:
      - Velocity Engine Spec: specs/velocity-engine-spec.md
      - Strategic Remediation Roadmap: specs/strategic-remediation-roadmap.md
      - Daemon Mode Roadmap: specs/daemon-mode-roadmap.md
      - Interactive Team Journeys: specs/interactive-team-journeys.md
      - Agent Teams Enablement: specs/agent-teams-enablement.md
