# Feature Spec Template
# Fill in each section. Remove placeholder lines.
spec_id: ""            # auto-generated by baton spec create
task_type: feature
template_id: feature
title: "<Short feature title>"

## Problem
# What problem does this feature solve? Who is affected?
problem: |
  <Describe the problem or user need>

## Proposed Solution
# High-level description of the approach.
solution: |
  <Describe the solution>

## Acceptance Criteria
# Testable conditions that define "done".
acceptance_criteria:
  - "<Criterion 1>"
  - "<Criterion 2>"

## Out of Scope
out_of_scope:
  - "<What this spec explicitly does NOT include>"

## Risks
risks:
  - id: R1
    description: "<Risk description>"
    mitigation: "<Mitigation approach>"

## Dependencies
dependencies:
  specs: []        # spec_ids this feature depends on
  plans: []        # task_ids this feature depends on

## Effort Estimate
effort: M          # XS | S | M | L | XL

## Score
score:
  clarity: 0.0     # 0.0–1.0
  testability: 0.0
  risk_coverage: 0.0
